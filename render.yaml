services:
  - type: web
    name: et-markets-backend
    runtime: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATABASE_SIGNALS
        sync: false
      - key: NOTION_DATABASE_RESEARCH
        sync: false
      - key: NOTION_DATABASE_PATTERNS
        sync: false
      - key: NOTION_DATABASE_PORTFOLIO
        sync: false
      - key: NOTION_DATABASE_WATCHLISTS
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: et-markets-frontend
    runtime: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://et-markets-backend.onrender.com
      - key: NODE_VERSION
        value: 20.0.0
